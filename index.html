<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alejandro Morales — Segundo Parcial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 50%, #0c4a6e 100%);
      color: #e2e8f0;
    }
    .card {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
      max-width: 90vw;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .id {
      font-size: 1.1rem;
      color: #7dd3fc;
      font-variant-numeric: tabular-nums;
      margin-bottom: 1.5rem;
    }
    .stack {
      font-size: 0.85rem;
      color: #94a3b8;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
    }
    .stack strong { color: #cbd5e1; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Alejandro Morales</h1>
    <p class="id">0907-22-11231</p>
    <p class="stack">
      <strong>Stack:</strong> Node.js + Express
    </p>
  </main>
</body>
</html>
